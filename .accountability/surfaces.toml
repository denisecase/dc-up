# ============================================================
# .accountability/surfaces.toml (ALL-PY-PYPI)
# ============================================================
# Updated: 2026-06-06
#
# REQ: Declare protected repository surfaces for dc-up.
# WHY: Identify repository areas where changes affect package behavior,
# template application authority, release automation, documentation, security,
# and human review boundaries.
# CUSTOM: Keep this file aligned with the standard Python CLI repository shape.

schema = "accountable-surface-spec"
schema_version = "0.1.0"
schema_url = "https://raw.githubusercontent.com/structural-explainability/accountable-surface-spec/main/data/schema/accountability-surfaces.schema.json"


# === Framework Context ===

[meta]
framework = "Accountable Repository Surfaces"
framework_url = "https://github.com/denisecase/accountable-surface-spec"
purpose = "Declares authority-bearing repository surfaces, review requirements, evidence requirements, and permitted AI authority."


# === Repository Identity ===

[repository]
organization = "denisecase"
name = "dc-up"
profile = "python-cli-repository"
description = "Python CLI for bringing repositories up to the current managed baseline from canonical templates."


# === CODEOWNERS Projection ===

[codeowners]
informs = true
requires_code_owner_review = false


# === Local CODEOWNERS Role Resolution ===

[codeowners.role_handles]
owner = "@denisecase"
maintainer = "@denisecase"
release = "@denisecase"
security = "@denisecase"


# === Required Oversight Role ===

[oversight_roles.owner]
label = "Owner"
description = "Reviews changes to the repository's own accountability declaration and authority boundary."
maps_to = ["authority_boundary", "authority_manifest_surface"]
requires_review = ["human_review"]
requires_evidence = ["decision_note", "human_review_record"]
ai_max_authority = "prohibited"


# === Additional Local Oversight Roles ===

[oversight_roles.maintainer]
label = "Maintainer"
description = "Reviews package behavior, public CLI behavior, repository documentation, tests, template-application behavior, and routine maintenance surfaces."
maps_to = [
    "dependency_boundary",
    "documentation_contract",
    "package_metadata_surface",
    "project_identity_surface",
    "public_command_surface",
    "public_contract",
    "python_version_contract",
    "tool_configuration",
    "validation_rule",
]
requires_review = ["human_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "drafting"

[oversight_roles.release]
label = "Release"
description = "Reviews automation, release, CI, documentation build, package build, and publishing authority."
maps_to = ["release_authority", "workflow_authority", "generated_output"]
requires_review = ["human_review", "release_review", "security_review"]
requires_evidence = ["decision_note", "release_record", "test_result", "verification_command_result"]
ai_max_authority = "advisory"

[oversight_roles.security]
label = "Security"
description = "Reviews repository surfaces that affect security posture, automation trust, dependency risk, template-fetching behavior, file-writing behavior, or disclosure process."
maps_to = ["dependency_boundary", "security_boundary", "workflow_authority"]
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "advisory"


# === Declared Repository Surfaces ===

# Surfaces below are organized by CODEOWNERS processing order.
# CODEOWNERS applies the LAST matching pattern for a path, so broad surfaces
# must emit before narrower override surfaces.
#
# codeowners_order controls projection order.
# Lower values emit earlier; later matching patterns take precedence.
# Ties are emitted alphabetically by surface id.


# === Level 100: Source and test defaults ===

# --- Package Source ---

[[surface]]
id = "package-source"
object_kind = "directory"
paths = ["src/**"]
description = "Python CLI implementation for detecting repository shape, fetching canonical templates, planning managed updates, applying baseline files, rendering calculated values, and reporting repo-specific TODOs."
oversight_role = "maintainer"
codeowners_order = 100

[[surface.role]]
kind = "public_command_surface"
requires_review = ["human_review", "architecture_review"]
requires_evidence = ["test_result", "type_check_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "public_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "test_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["test_result", "type_check_result", "verification_command_result"]
ai_max_authority = "drafting"


# --- Baseline Update Engine ---

[[surface]]
id = "baseline-update-engine"
object_kind = "directory"
paths = [
    "src/**/apply*.py",
    "src/**/fetch*.py",
    "src/**/render*.py",
    "src/**/template*.py",
    "src/**/baseline*.py",
]
description = "Implementation surfaces that fetch canonical template files, calculate target repository changes, render values, and write managed baseline files."
oversight_role = "security"
codeowners_order = 105

[[surface.role]]
kind = "security_boundary"
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note", "test_result", "verification_command_result"]
ai_max_authority = "advisory"

[[surface.role]]
kind = "public_command_surface"
requires_review = ["human_review", "architecture_review"]
requires_evidence = ["test_result", "verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["test_result", "verification_command_result"]
ai_max_authority = "drafting"


# --- Test Suite ---

[[surface]]
id = "test-suite"
object_kind = "directory"
paths = ["tests/**"]
description = "Tests for repository detection, template layer selection, dry-run planning, write behavior, rendered values, preserve rules, and TODO reporting."
oversight_role = "maintainer"
codeowners_order = 110

[[surface.role]]
kind = "public_contract"
requires_review = ["human_review"]
requires_evidence = ["test_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["test_result"]
ai_max_authority = "drafting"


# === Level 300: Project configuration and package contract ===

# --- Build and Package Configuration ---

[[surface]]
id = "build-and-package-configuration"
object_kind = "file"
paths = [
    "pyproject.toml",
    "uv.lock",
]
description = "Python package metadata, build configuration, dependency declarations, dependency lock, and public command exposure."
oversight_role = "maintainer"
codeowners_order = 300

[[surface.role]]
kind = "dependency_boundary"
requires_review = ["human_review", "security_review"]
requires_evidence = ["dependency_resolution_result", "test_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "package_metadata_surface"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "public_command_surface"
requires_review = ["human_review"]
requires_evidence = ["test_result", "verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "python_version_contract"
requires_review = ["human_review"]
requires_evidence = ["test_result"]
ai_max_authority = "drafting"


# --- Repository Hygiene Configuration ---

[[surface]]
id = "repository-hygiene-configuration"
object_kind = "directory"
paths = [
    ".editorconfig",
    ".gitattributes",
    ".gitignore",
    ".markdownlint-cli2.yaml",
    ".pre-commit-config.yaml",
]
description = "Repository hygiene configuration for formatting, line endings, ignored files, Markdown linting, and local validation."
oversight_role = "maintainer"
codeowners_order = 310

[[surface.role]]
kind = "tool_configuration"
requires_review = ["human_review"]
requires_evidence = ["verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "drafting"


# --- Documentation Tooling Configuration ---

[[surface]]
id = "documentation-tooling-configuration"
object_kind = "file"
paths = [
    "zensical.toml",
]
description = "Documentation site configuration, repository documentation metadata, generated site settings, and API documentation behavior."
oversight_role = "maintainer"
codeowners_order = 320

[[surface.role]]
kind = "tool_configuration"
requires_review = ["human_review"]
requires_evidence = ["verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "documentation_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "drafting"


# === Level 400: Documentation and repository identity ===

# --- Documentation Sources ---

[[surface]]
id = "documentation-sources"
object_kind = "directory"
paths = ["docs/**"]
description = "Documentation sources for dc-up usage, commands, template layers, managed files, preserve rules, and release workflow."
oversight_role = "maintainer"
codeowners_order = 400

[[surface.role]]
kind = "documentation_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"


# --- Repository History ---

[[surface]]
id = "repository-history"
object_kind = "file"
paths = [
    "CHANGELOG.md",
    "DECISIONS.md",
]
description = "Repository change history and durable design decisions."
oversight_role = "maintainer"
codeowners_order = 410

[[surface.role]]
kind = "documentation_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"


# --- Repository Identity ---

[[surface]]
id = "repository-identity"
object_kind = "file"
paths = [
    "CITATION.cff",
    "README.md",
]
description = "Repository identity, scope, citation metadata, usage guidance, badges, and project links."
oversight_role = "maintainer"
codeowners_order = 420

[[surface.role]]
kind = "project_identity_surface"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "public_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"


# --- Repository Governance ---

[[surface]]
id = "repository-governance"
object_kind = "directory"
paths = [
    ".annotations/**",
    "AGENTS.md",
    "ANNOTATIONS.md",
    "CONTRIBUTING.md",
    "SECURITY.md",
]
description = "Repository governance, contribution, annotation, AI-assistance, and security documentation."
oversight_role = "maintainer"
codeowners_order = 430

[[surface.role]]
kind = "documentation_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "security_boundary"
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note"]
ai_max_authority = "advisory"


# === Level 500: Release, automation, and generated outputs ===

# --- Release and CI Workflows ---

[[surface]]
id = "release-and-ci-workflows"
object_kind = "workflow"
paths = [
    ".github/workflows/**",
    ".github/dependabot.yml",
]
description = "Continuous integration, validation, documentation, release, dependency update, package build, and publishing workflows."
oversight_role = "release"
codeowners_order = 500

[[surface.role]]
kind = "release_authority"
requires_review = ["human_review", "release_review", "security_review"]
requires_evidence = ["release_record", "test_result", "verification_command_result"]
ai_max_authority = "advisory"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["test_result", "verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "workflow_authority"
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "advisory"


# --- Build Artifacts ---

[[surface]]
id = "build-artifacts"
object_kind = "generated-output"
paths = [
    "dist/**",
    "site/**",
]
description = "Generated build, package, and documentation artifacts that should be reproducible from source."
oversight_role = "release"
codeowners_order = 510

[[surface.role]]
kind = "generated_output"
requires_review = ["human_review"]
requires_evidence = ["regeneration_record", "verification_command_result"]
ai_max_authority = "drafting"

[[surface.role]]
kind = "release_authority"
requires_review = ["human_review", "release_review"]
requires_evidence = ["release_record", "verification_command_result"]
ai_max_authority = "advisory"


# === Level 600: Security-sensitive repository surfaces ===

# --- Security Configuration and Disclosure ---

[[surface]]
id = "security-configuration"
object_kind = "directory"
paths = [
    ".github/lychee.toml",
    ".github/.yamllint.yml",
    "SECURITY.md",
]
description = "Security-facing configuration, link checking, YAML checking, and disclosure documentation."
oversight_role = "security"
codeowners_order = 600

[[surface.role]]
kind = "security_boundary"
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note", "verification_command_result"]
ai_max_authority = "advisory"

[[surface.role]]
kind = "validation_rule"
requires_review = ["human_review"]
requires_evidence = ["verification_command_result"]
ai_max_authority = "drafting"


# --- Template Source Trust Boundary ---

[[surface]]
id = "template-source-trust-boundary"
object_kind = "external-contract"
paths = [
    "src/**",
    "README.md",
    "docs/**",
]
description = "Public contract and trust boundary for fetching canonical template files from denisecase/templates or another configured template source."
oversight_role = "security"
codeowners_order = 610

[[surface.role]]
kind = "security_boundary"
requires_review = ["human_review", "security_review"]
requires_evidence = ["decision_note", "test_result", "verification_command_result"]
ai_max_authority = "advisory"

[[surface.role]]
kind = "public_contract"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "test_result"]
ai_max_authority = "drafting"


# === Level 700: Required Self-Protection ===

# Every accountable-surface manifest MUST declare itself as a protected surface.
# If an actor with technical capability can rewrite the authority declaration
# without review, technical capability has silently become authority.

# --- Authority Manifest Self-Protection ---

[[surface]]
id = "authority-manifest"
object_kind = "file"
paths = [".accountability/surfaces.toml"]
description = "Self-protecting authority manifest for this repository."
oversight_role = "owner"
codeowners_order = 700

[[surface.role]]
kind = "authority_boundary"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "human_review_record"]
ai_max_authority = "prohibited"

[[surface.role]]
kind = "authority_manifest_surface"
requires_review = ["human_review"]
requires_evidence = ["decision_note", "human_review_record"]
ai_max_authority = "prohibited"


# === Verification ===

[verification]
commands = [
    "uv lock --upgrade",
    "uv sync --extra dev --extra docs --upgrade",
    "uvx pre-commit install",
    "uvx pre-commit run --all-files",
    "uv run python -m pyright",
    "uv run python -m pytest",
    "uv run python -m zensical build",
    "uv build",
    "uvx twine check dist/*",
]
