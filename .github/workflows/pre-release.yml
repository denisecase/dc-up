# ============================================================
# .github/workflows/pre-release.yml (ALL-PY-PYPI)
# ============================================================
# Updated: 2026-06-06
#
# WHY: Validate tagged Python package artifacts before release.
# REQ: Reusable by PyPI package repositories.
# OBS: Generic only; repo-specific artifact checks belong in separate workflows.

name: Pre-Release Checks and Build

on:
  workflow_call:     # WHY: Allow calling from PyPI repos in this org.
  workflow_dispatch: # WHY: Allow manual trigger for pre-release checks if needed.

permissions: # WHY: Use least privileges required.
  contents: read

env:
  PYTHONUNBUFFERED: "1"       # WHY: Real-time logging.
  PYTHONIOENCODING: "utf-8"   # WHY: Ensure UTF-8 encoding for international characters.

jobs:
  pre-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # WHY: Prevent hanging jobs. If over, it is likely stuck.
    env:
      PYTHON_VERSION: "3.14"

    steps:

      # === ASSEMBLE ===

      - name: A1) Checkout repository with full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # WHY: hatch-vcs needs full history to derive version from tags.
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: A2) Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: A3) Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: A4) Display versions
        run: |
          uv --version
          uv run python --version

      # === BASELINE CHECKS (build while git is pristine) ===

      - name: B1) Extract plain version from tag (no leading 'v')
        id: ver
        shell: bash
        run: echo "plain=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: B2) Verify git is clean before build
        run: |
          echo "Git status:"
          git status --short
          echo "Git describe:"
          git describe --tags --always --dirty
          if [[ $(git status --porcelain) ]]; then
            echo "ERROR: Git tree is dirty before build!"
            exit 1
          fi

      - name: B3) Build sdist + wheel
        # WHY: hatch-vcs derives version from git tag; build before uv sync
        # to avoid working tree changes invalidating the clean check.
        run: uv build

      - name: B4) Ensure built artifact version matches tag
        shell: bash
        run: |
          set -e
          TAG="${{ steps.ver.outputs.plain }}"
          echo "Tag version: $TAG"
          ls dist
          if ! ls dist/*"$TAG"*.whl dist/*"$TAG"*.tar.gz >/dev/null 2>&1; then
            echo "ERROR: Built artifact version does not match tag $TAG"
            exit 1
          fi
          echo "Artifact version matches tag."

      - name: B5) Sync all dependencies with locked versions
        run: uv sync --extra dev --extra docs --locked

      - name: B6) Validate built artifacts
        run: uvx twine check dist/*
