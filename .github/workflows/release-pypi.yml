# ============================================================
# .github/workflows/release-pypi.yml (ALL-PY-PYPI)
# ============================================================
# Updated: 2026-06-06

# WHY: Publish a tagged Python package release to PyPI.
# REQ: Trigger ONLY on version tags like v1.2.3.
# REQ: PyPI project must be configured for Trusted Publishing (OIDC).
# REQ: uv build must run from a clean tagged checkout.
# OBS: Documentation deployment is handled separately by deploy-zensical.yml.

name: Release (PyPI + Zensical docs)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # WHY: Create GitHub Release.
  pages: write      # WHY: Required to deploy to GitHub Pages.
  id-token: write   # WHY: PyPI Trusted Publishing (OIDC) + deploy-pages OIDC.

env:
  PYTHONUNBUFFERED: "1"       # WHY: Real-time logging.
  PYTHONIOENCODING: "utf-8"   # WHY: Ensure UTF-8 encoding for international characters.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # WHY: Never cancel a release in progress.

jobs:

  pre-release:
    uses: ./.github/workflows/pre-release.yml

  build-and-release:
    needs: pre-release  # WHY: Never publish if pre-release checks fail.
    runs-on: ubuntu-latest
    timeout-minutes: 30 # WHY: Prevent hanging jobs. If over, it is likely stuck.
    environment: pypi  # WHY: Use 'pypi' environment for PyPI publishing; ignore warnings.
    env:
      PYTHON_VERSION: "3.14"

    steps:

      # === ASSEMBLE ===

      - name: A1) Checkout repository with full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # WHY: hatch-vcs needs full history to derive version from tags.
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: A2) Install uv (with caching and uv.lock awareness)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: A3) Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: A4) Display versions
        run: |
          uv --version
          uv run python --version

      # === BASELINE CHECKS (build while git is pristine) ===

      - name: B1) Extract plain version from tag (no leading 'v')
        id: ver
        shell: bash
        run: echo "plain=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: B2) Verify git is clean before build
        run: |
          echo "Git status:"
          git status --short
          echo "Git describe:"
          git describe --tags --always --dirty
          if [[ $(git status --porcelain) ]]; then
            echo "ERROR: Git tree is dirty before build!"
            exit 1
          fi

      - name: B3) Build sdist + wheel
        run: uv build

      - name: B4) Ensure built artifact version matches tag
        shell: bash
        run: |
          set -e
          TAG="${{ steps.ver.outputs.plain }}"
          echo "Tag version: $TAG"
          ls dist
          if ! ls dist/*"$TAG"*.whl dist/*"$TAG"*.tar.gz >/dev/null 2>&1; then
            echo "ERROR: Built artifact version does not match tag $TAG"
            exit 1
          fi
          echo "Artifact version matches tag."

      # === CREATE RELEASE ===

      - name: C1) Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true

      - name: C2) Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
