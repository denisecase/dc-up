# ============================================================
# .pre-commit-config.yaml (ALL-REPOS)
# ============================================================
# Updated: 2026-06-06
#
# REQ: Professional project repositories SHOULD include a pre-commit
# configuration for basic file hygiene.
# WHY: Provide fast, consistent checks before committing code.
#
# OBS: Language-specific hooks belong in more specific baselines such as
# ALL-PY or ALL-TS.
# CUSTOM: Override this file in a more specific baseline when project checks
# depend on Python, Node, TypeScript, notebooks, or other tooling.

exclude: |
  (?x)^(
    \.DS_Store|
    \.coverage|
    \.mypy_cache/|
    \.nox/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.tox/|
    \.venv/|
    .*\.log|
    __pycache__/|
    build/|
    coverage/|
    coverage\.xml|
    dist/|
    htmlcov/|
    node_modules/|
    out/|
    site/|
    tmp/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: A1) Clean trailing whitespace
        args: [--markdown-linebreak-ext=md]

      - id: end-of-file-fixer
        name: A2) End files with a newline

      - id: mixed-line-ending
        name: A3) Normalize line endings to LF before checks
        args: [--fix=lf]

      - id: check-json
        name: B1) Validate JSON syntax
        exclude: ^\.vscode/.*\.json$

      - id: check-toml
        name: B2) Validate TOML syntax

      - id: check-yaml
        name: B3) Validate YAML syntax
        files: \.(yml|yaml)$

      - id: check-added-large-files
        name: C1) Prevent accidental commits of large binaries
        args: [--maxkb=2000]

      - id: check-merge-conflict
        name: C2) Prevent committing merge conflicts

      - id: check-case-conflict
        name: C3) Check for filename case conflicts

fail_fast: false
